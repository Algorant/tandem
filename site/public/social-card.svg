    <text x="120" y="292" fill="#fbf1c7" font-size="86" font-weight="800" letter-spacing="-3">Local-first</text>
    <text x="120" y="386" fill="#fbf1c7" font-size="86" font-weight="800" letter-spacing="-3">coordination</text>
    <text x="124" y="456" fill="#d5c4a1" font-size="34" font-weight="500">Tasks · accords · decisions · validation · logs</text>
