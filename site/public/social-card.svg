<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="social-title social-desc">
  <title id="social-title">Tandem documentation</title>
  <desc id="social-desc">Local-first coordination for human and agent work in one repository.</desc>
  <defs>
    <radialGradient id="halo" cx="22%" cy="16%" r="68%">
      <stop offset="0" stop-color="#2f4a38"/>
      <stop offset="0.46" stop-color="#222526"/>
      <stop offset="1" stop-color="#1d2021"/>
    </radialGradient>
    <linearGradient id="markA" x1="760" x2="1050" y1="220" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d5e7d0"/>
      <stop offset="0.55" stop-color="#8ec07c"/>
      <stop offset="1" stop-color="#83a598"/>
    </linearGradient>
    <linearGradient id="markB" x1="805" x2="1018" y1="430" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6bf86"/>
      <stop offset="1" stop-color="#c7e5df"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
