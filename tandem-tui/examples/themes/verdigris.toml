# Tandem Verdigris TUI theme selector.
#
# To evaluate from the repository root:
#   cp tandem-tui/examples/themes/verdigris.toml .tandem/theme.toml
#   cd tandem-tui && cargo run -- tui
#
# NO_COLOR=1 or TANDEM_NO_COLOR=1 keeps Tandem in the terminal/no-color fallback.
base = "verdigris"
name = "verdigris"
