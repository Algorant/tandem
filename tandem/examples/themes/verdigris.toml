# Tandem Verdigris TUI theme preset.
#
# Use as a user theme:
#   mkdir -p ~/.config/tandem/themes
#   cp tandem/examples/themes/verdigris.toml ~/.config/tandem/themes/verdigris.toml
#
# Select from a workspace without copying the full theme:
#   printf 'theme = "verdigris"\n' > .tandem/theme.toml
#
# To evaluate the repository default from the repository root:
#   cp tandem/examples/themes/verdigris.toml .tandem/theme.toml
#   cd tandem && cargo run -- tui
#
# NO_COLOR=1 or TANDEM_NO_COLOR=1 keeps Tandem in the terminal/no-color fallback.
# Badge styles: muted (default), accent, text, ghost, solid.
base = "verdigris"
name = "verdigris"
badge_style = "muted"

# Board workflow-state chips. TODO intentionally keeps the muted fallback.
[aliases]
burnt-copper = "#c96f3d"
heather = "#ad8294"

[badges.states]
in-progress = "burnt-copper"
validation = "heather"
